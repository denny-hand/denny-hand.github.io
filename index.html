<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>denny</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 40 40' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 20C12 20 10 10 13 8C16 6 18 15 18 15M18 15C18 15 19 5 22 5C25 5 25 15 25 15M25 15C25 15 28 6 31 8C34 10 30 20 30 20M30 20C30 20 38 18 38 22C38 26 30 28 25 32C20 36 10 35 10 35'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f2f0eb; --text: #1a1916; --text-muted: #8a8880; --accent: #c84b2f;
    --border: rgba(26,25,22,0.1); --card-hover: #e8e5df; --thumb: #d4d0c8;
    --input-border: rgba(26,25,22,0.2); --input-bg: #fff; --modal-bg: #181715;
  }
  [data-theme="dark"] {
    --bg: #111110; --text: #eeebe4; --text-muted: #5a5854; --accent: #d95a38;
    --border: rgba(238,235,228,0.08); --card-hover: #1c1b18; --thumb: #252320;
    --input-border: rgba(238,235,228,0.15); --input-bg: #1a1917; --modal-bg: #0e0d0c;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; overflow-x: hidden; width: 100%; }

  /* lock */
  #lock { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: background 0.3s; overflow: hidden; }
  #nuke-canvas { position: absolute; inset: 0; pointer-events: none; }
  .lock-score { position: absolute; top: 20px; right: 24px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; font-weight: 300; }
  #lock.hidden { display: none; }
  .hand-svg { width: 65px; height: 65px; stroke: var(--text); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; margin-bottom: 24px; position: relative; z-index: 1; }
  .hand-svg:hover { transform: rotate(-10deg) scale(1.15); }
  .lock-name { font-size: 13px; font-weight: 500; margin-bottom: 40px; position: relative; z-index: 1; }
  .lock-label { font-size: 11px; color: var(--text-muted); font-weight: 300; margin-bottom: 12px; letter-spacing: 0.05em; position: relative; z-index: 1; }
  .lock-form { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 210px; position: relative; z-index: 1; }
  .lock-input { width: 100%; padding: 10px 14px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; color: var(--text); background: var(--input-bg); border: 0.5px solid var(--input-border); border-radius: 4px; outline: none; text-align: center; letter-spacing: 0.2em; transition: border-color 0.2s, background 0.3s; }
  .lock-input:focus { border-color: var(--text-muted); }
  .lock-input.error { border-color: var(--accent); }
  .lock-btn { width: 100%; padding: 10px; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text); background: none; border: 0.5px solid var(--input-border); border-radius: 4px; cursor: pointer; transition: background 0.2s; letter-spacing: 0.05em; }
  .lock-btn:hover { background: var(--card-hover); border-color: var(--text-muted); }
  .lock-error { font-size: 11px; color: var(--accent); font-weight: 300; height: 14px; }

  /* site */
  #site { display: none; }
  #site.visible { display: block; }

  /* header */
  header { padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); min-width: 0; }
  .site-brand { display: flex; align-items: center; gap: 8px; }
  .site-name { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }
  .site-logo { width: 22px; height: 22px; stroke: var(--text); flex-shrink: 0; transform-origin: bottom center; }
  @keyframes wave { 0% { transform: rotate(0deg); } 15% { transform: rotate(14deg); } 30% { transform: rotate(-8deg); } 45% { transform: rotate(12deg); } 60% { transform: rotate(-6deg); } 75% { transform: rotate(10deg); } 100% { transform: rotate(0deg); } }
  .site-brand:hover .site-logo { animation: wave 1.2s ease-in-out infinite; }
  .header-right { display: flex; align-items: center; gap: 24px; }
  nav { display: flex; gap: 20px; }
  nav a { font-size: 12px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  nav a:hover, nav a.active { color: var(--text); }
  .theme-toggle { cursor: pointer; background: none; border: none; padding: 0; display: flex; align-items: center; }
  .toggle-track { width: 32px; height: 18px; background: var(--text-muted); border-radius: 9px; position: relative; transition: background 0.3s; }
  .toggle-knob { width: 12px; height: 12px; background: var(--bg); border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: transform 0.3s, background 0.3s; }
  [data-theme="dark"] .toggle-knob { transform: translateX(14px); }

  /* hero */
  .hero { padding: 20px 28px 0; }
  .hero-player {
    width: 100%;
    max-height: 45vh;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .hero-player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .hero-player video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; object-fit: cover; }
  .hero-overlay {
    position: absolute; inset: 0; z-index: 4;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.28);
    cursor: pointer;
    transition: background 0.25s;
  }
  .hero-overlay:hover { background: rgba(0,0,0,0.15); }
  .hero-play-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 24px;
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 32px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.04em;
    backdrop-filter: blur(4px);
    background: rgba(255,255,255,0.08);
    transition: background 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .hero-overlay:hover .hero-play-btn { background: rgba(255,255,255,0.18); transform: scale(1.04); }
  .hero-play-icon {
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid #fff;
    margin-left: 2px;
  }
  .hero-label { display: flex; align-items: center; gap: 8px; padding: 10px 2px 0; font-size: 11px; color: var(--text-muted); font-weight: 300; letter-spacing: 0.05em; }
  .hero-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.25; } }

  /* filter */
  .filter-bar { padding: 16px 28px 0; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-bar--role { padding-top: 8px; }
  .filter-bar--role:empty { display: none; }
  .filter-btn { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400; color: var(--text-muted); background: none; border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 14px; cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s; letter-spacing: 0.03em; white-space: nowrap; }
  .filter-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .filter-btn.active { color: var(--bg); background: var(--text); border-color: var(--text); }

  /* grid */
  .grid-wrap { padding: 16px 28px 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
  .grid .card { flex: 0 1 320px; }
  .grid-section-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); padding: 0 0 12px; opacity: 0.5; }
  .grid-divider { height: 0.5px; background: var(--border); margin: 28px 0 24px; opacity: 0.5; }
  .card--featured::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); z-index: 4; }

  /* card */
  .card { display: block; text-decoration: none; color: inherit; border-radius: 6px; overflow: hidden; position: relative; aspect-ratio: 16/9; background: var(--thumb); cursor: pointer; width: 100%; min-width: 0; opacity: 0; transform: translateY(10px); transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease; }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.18); transform: translateY(-3px); }
  .card img, .card video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.45s ease; }
  .card video { opacity: 0; transition: opacity 0.4s ease, transform 0.45s ease; z-index: 1; }
  .card:hover img, .card:hover video { transform: scale(1.04); }
  .card:hover video, .card.touch-active video { opacity: 1; }
  .card-overlay { position: absolute; inset: 0; z-index: 2; background: linear-gradient(to bottom, transparent 30%, rgba(10,9,8,0.55) 65%, rgba(10,9,8,0.82) 100%); }
  .card-body { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; padding: 18px 20px; display: flex; flex-direction: column; gap: 5px; }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .card-year { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 300; display: none; /* hidden — remove to restore */ }
  .role-tag { position: absolute; top: 12px; right: 12px; z-index: 4; font-size: 9px; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(255,255,255,0.9); background: rgba(200,75,47,0.75); padding: 3px 8px; border-radius: 2px; white-space: nowrap; }
  .card-title { font-size: 16px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.2; color: #fff; }
  .card-desc { font-size: 11px; line-height: 1.6; color: rgba(255,255,255,0.6); font-weight: 300; max-height: 0; overflow: hidden; transition: max-height 0.35s ease, opacity 0.3s; opacity: 0; }
  .card:hover .card-desc { max-height: 60px; opacity: 1; }
  .scrub-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; z-index: 5; background: rgba(255,255,255,0.15); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .card:hover .scrub-bar { opacity: 1; }
  .scrub-progress { height: 100%; width: 0%; background: var(--accent); }
  .card-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .fallback-play { width: 34px; height: 34px; border: 1.5px solid rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .fallback-play::after { content: ''; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid rgba(255,255,255,0.4); margin-left: 3px; }

  /* modal */
  #modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0); align-items: center; justify-content: center; transition: background 0.3s ease; }
  #modal.open { display: flex; background: rgba(0,0,0,0.88); }
  .modal-inner { position: relative; width: 92%; max-width: 1100px; background: var(--modal-bg); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; transform: scale(0.92); opacity: 0; transition: transform 0.32s cubic-bezier(0.34,1.3,0.64,1), opacity 0.25s ease; }
  .modal-inner.page-mode { width: 96vw; max-width: 96vw; height: 94vh; max-height: 94vh; }
  .modal-page-wrap { display: none; flex: 1; min-height: 0; overflow: hidden; }
  .modal-page-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
  .modal-inner.page-mode .modal-page-wrap { display: flex; flex-direction: column; }
  .modal-inner.page-mode .modal-body { display: none; }
  #modal.open .modal-inner { transform: scale(1); opacity: 1; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .modal-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); letter-spacing: -0.01em; }
  .modal-close-btn { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 11px; font-family: 'Inter', sans-serif; cursor: pointer; letter-spacing: 0.05em; transition: color 0.2s; padding: 4px 0; }
  .modal-close-btn:hover { color: #fff; }
  .modal-body { display: flex; flex-direction: row; flex: 1; overflow: hidden; min-height: 0; }
  .modal-videos { flex: 1; display: flex; flex-direction: column; overflow-y: auto; min-width: 0; }
  .modal-video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; flex-shrink: 0; }
  .modal-video-wrap iframe, .modal-video-wrap video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; object-fit: contain; }
  .modal-breakdown-wrap { display: none; flex-direction: column; flex-shrink: 0; }
  .modal-breakdown-wrap.visible { display: flex; }
  .modal-breakdown-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 10px 16px 8px; font-family: 'Inter', sans-serif; }
  .modal-breakdown-video { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; flex-shrink: 0; }
  .modal-breakdown-video iframe, .modal-breakdown-video video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; object-fit: contain; }
  .modal-info { width: 260px; flex-shrink: 0; padding: 24px 22px; border-left: 0.5px solid rgba(255,255,255,0.08); overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
  .modal-info.empty { display: none; }
  .modal-meta { display: flex; flex-direction: column; gap: 8px; }
  .modal-meta-row { display: flex; flex-direction: column; gap: 2px; }
  .modal-meta-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .modal-meta-value { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 400; }
  .modal-details { font-size: 12px; line-height: 1.75; color: rgba(255,255,255,0.5); font-weight: 300; }

  /* footer */
  footer { padding: 22px 32px; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .footer-copy { font-size: 11px; color: var(--text-muted); font-weight: 300; }
  .footer-links { display: flex; gap: 20px; }
  .footer-links a { font-size: 11px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--text); }
  .email-toggle { font-size: 11px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
  .email-toggle:hover { color: var(--text); }
  .email-toggle.revealed { color: var(--text); }

  /* mobile */
  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .site-name { font-size: 13px; }
    nav { gap: 12px; }
    nav a { font-size: 11px; }
    .header-right { gap: 16px; }
    .hero { padding: 12px 12px 0; }
    .hero-player { max-height: 28vh; }
    .filter-bar { padding: 12px 12px 0; }
    .grid-wrap { padding: 12px 12px 32px; }
    .grid { grid-template-columns: 1fr; gap: 10px; }
    .card-title { font-size: 15px; }
    .card-body { padding: 14px 16px; }
    footer { padding: 18px 16px; flex-direction: column; align-items: flex-start; gap: 12px; }
    .modal-inner { width: 100%; max-width: 100%; border-radius: 0; max-height: 100vh; }
    .modal-body { flex-direction: column; overflow-y: auto; }
    .modal-info { width: 100%; border-left: none; border-top: 0.5px solid rgba(255,255,255,0.08); }
    #modal { padding: 0; align-items: flex-end; }
    #modal.open { background: rgba(0,0,0,0.92); }
  }
</style>
</head>
<body>

<div id="lock">
  <canvas id="nuke-canvas"></canvas>
  <span class="lock-score" id="lock-score">0 nodes</span>
  <svg class="hand-svg" viewBox="0 0 40 40" fill="none" stroke-width="2" stroke-linecap="round">
    <path d="M12 20C12 20 10 10 13 8C16 6 18 15 18 15M18 15C18 15 19 5 22 5C25 5 25 15 25 15M25 15C25 15 28 6 31 8C34 10 30 20 30 20M30 20C30 20 38 18 38 22C38 26 30 28 25 32C20 36 10 35 10 35" />
  </svg>
  <p class="lock-name">denny</p>
  <p class="lock-label">enter password to view</p>
  <div class="lock-form">
    <input class="lock-input" type="password" id="pwd" placeholder="· · · ·" maxlength="32" />
    <div class="lock-error" id="err"></div>
    <button class="lock-btn" onclick="check()">enter</button>
  </div>
</div>

<div id="site">
  <header>
    <div class="site-brand">
      <span class="site-name">denny</span>
      <svg class="site-logo" viewBox="0 0 40 40" fill="none" stroke-width="2" stroke-linecap="round">
        <path d="M12 20C12 20 10 10 13 8C16 6 18 15 18 15M18 15C18 15 19 5 22 5C25 5 25 15 25 15M25 15C25 15 28 6 31 8C34 10 30 20 30 20M30 20C30 20 38 18 38 22C38 26 30 28 25 32C20 36 10 35 10 35" />
      </svg>
    </div>
    <div class="header-right">
      <nav>
        <a href="#" class="active">work</a>
        <a href="#">about</a>
        <a href="#">contact</a>
      </nav>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="toggle theme">
        <div class="toggle-track"><div class="toggle-knob"></div></div>
      </button>
    </div>
  </header>

  <div class="hero" id="hero" style="display:none">
    <div class="hero-player" id="hero-player">
      <div class="hero-overlay" id="hero-overlay" onclick="playHero()">
        <div class="hero-play-btn">
          <div class="hero-play-icon"></div>
          watch showreel
        </div>
      </div>
    </div>
    <div class="hero-label"><span class="hero-dot"></span><span id="hero-title"></span></div>
  </div>

  <div class="filter-bar" id="cat-filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">all</button>
    <button class="filter-btn" onclick="setFilter('feature film', this)">feature film</button>
    <button class="filter-btn" onclick="setFilter('animation', this)">animation</button>
    <button class="filter-btn" onclick="setFilter('2d animation', this)">2d animation</button>
    <button class="filter-btn" onclick="setFilter('commercial', this)">commercial</button>
    <button class="filter-btn" onclick="setFilter('music video', this)">music video</button>
  </div>
  <div class="filter-bar filter-bar--role" id="role-filter-bar"></div>

  <div class="grid-wrap">
    <div id="grid"></div>
  </div>

  <footer>
    <span class="footer-copy">© 2024 denny</span>
    <div class="footer-links">
      <a href="#" id="footer-imdb" target="_blank" rel="noopener">imdb</a>
      <a href="#" id="footer-linkedin" target="_blank" rel="noopener">linkedin</a>
      <span class="email-toggle" id="email-toggle" onclick="showEmail()">email</span>
    </div>
  </footer>
</div>

<div id="modal" onclick="handleModalClick(event)">
  <div class="modal-inner">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close-btn" onclick="closeModal()">close ✕</button>
    </div>
    <div class="modal-page-wrap" id="modal-page-wrap"></div>
    <div class="modal-body">
      <div class="modal-videos">
        <div class="modal-video-wrap" id="modal-main-wrap"></div>
        <div class="modal-breakdown-wrap" id="modal-breakdown-wrap">
          <span class="modal-breakdown-label">breakdown</span>
          <div class="modal-breakdown-video" id="modal-bd-wrap"></div>
        </div>
      </div>
      <div class="modal-info" id="modal-info">
        <div class="modal-meta" id="modal-meta"></div>
        <p class="modal-details" id="modal-details"></p>
      </div>
    </div>
  </div>
</div>

<script>
const PASSWORD = "1111";
const PASSWORD_ENABLED = false; // true = включить пароль, false = отключить

function parseCSV(text) {
  var settings = {};
  var projectLines = [];
  var lines = text.split("\n").filter(function(l) { return l.trim() && !l.trim().startsWith("#"); });
  lines.forEach(function(l) {
    if (l.trim().startsWith("setting:")) {
      var parts = l.trim().slice(8).split(",");
      if (parts.length >= 2) settings[parts[0].trim()] = parts[1].trim();
    } else {
      projectLines.push(l);
    }
  });
  window._settings = settings;
  if (projectLines.length < 2) return [];
  var headers = projectLines[0].split(",").map(function(h) { return h.trim(); });
  return projectLines.slice(1).map(function(line) {
    var values = [], cur = "", inQuote = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"' && !inQuote) { inQuote = true; continue; }
      if (ch === '"' && inQuote) { inQuote = false; continue; }
      if (ch === ',' && !inQuote) { values.push(cur.trim()); cur = ""; continue; }
      cur += ch;
    }
    values.push(cur.trim());
    var obj = {};
    headers.forEach(function(h, i) { obj[h] = values[i] || ""; });
    return obj;
  });
}

function applySettings(s) {
  // theme
  var theme = (s.theme || "1").trim();
  var toggle = document.querySelector(".theme-toggle");
  if (theme === "2") {
    document.documentElement.setAttribute("data-theme", "light");
    if (toggle) toggle.style.display = "none";
  } else if (theme === "3") {
    document.documentElement.setAttribute("data-theme", "dark");
    if (toggle) toggle.style.display = "none";
  } else {
    if (toggle) toggle.style.display = "";
  }
  // filters
  var catBar = document.getElementById("cat-filter-bar");
  if (catBar) catBar.style.display = (s.show_cat_filter === "false") ? "none" : "";
  if (s.show_role_filter === "false") {
    var roleBar = document.getElementById("role-filter-bar");
    if (roleBar) roleBar.style.display = "none";
  }
  // links
  var imdbEl = document.getElementById("footer-imdb");
  var liEl = document.getElementById("footer-linkedin");
  if (imdbEl && s.imdb) imdbEl.href = s.imdb;
  if (liEl && s.linkedin) liEl.href = s.linkedin;
  if (s.email) window._contactEmail = s.email;
}

function sorted(list) {
  var featured = list.filter(function(x) { return (x.featured || "").toLowerCase() === "yes"; });
  var rest = list.filter(function(x) { return (x.featured || "").toLowerCase() !== "yes"; });
  var withP = rest.filter(function(x) { return x.priority !== "" && !isNaN(Number(x.priority)); }).sort(function(a,b) { return Number(a.priority) - Number(b.priority); });
  var noP = rest.filter(function(x) { return x.priority === "" || isNaN(Number(x.priority)); }).sort(function(a,b) {
    var da = a.date || a.year || "0", db = b.date || b.year || "0";
    return db.localeCompare(da);
  });
  return featured.concat(withP).concat(noP);
}

var currentFilter = 'all';
var currentRoleFilter = 'all';

function applyFilters() {
  var filtered = window._allProjects.filter(function(p) {
    var catOk = currentFilter === 'all' || (p.category || '').toLowerCase() === currentFilter;
    var roleOk = currentRoleFilter === 'all' || (p.role || '').toLowerCase() === currentRoleFilter;
    return catOk && roleOk;
  });
  document.getElementById('grid').innerHTML = '';
  renderGrid(filtered);
}

function setFilter(cat, btn) {
  currentFilter = cat;
  var btns = document.querySelectorAll('#cat-filter-bar .filter-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  applyFilters();
}

function setRoleFilter(role, btn) {
  currentRoleFilter = role;
  var btns = document.querySelectorAll('#role-filter-bar .filter-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  applyFilters();
}

function getEmbedUrl(url, autoplay) {
  if (!url) return null;
  var yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (yt) return "https://www.youtube.com/embed/" + yt[1] + (autoplay ? "?autoplay=1&rel=0" : "?rel=0");
  var vm = url.match(/vimeo\.com\/(\d+)/);
  if (vm) return "https://player.vimeo.com/video/" + vm[1] + (autoplay ? "?autoplay=1" : "");
  return null;
}

function buildPlayer(url, autoplay, container) {
  container.innerHTML = "";
  if (!url) return false;
  if (url.match(/\.(webm|mp4)$/i)) {
    var v = document.createElement("video");
    v.src = url; v.controls = true; v.preload = "auto";
    if (autoplay) v.autoplay = true;
    container.appendChild(v);
  } else {
    var embed = getEmbedUrl(url, autoplay);
    if (!embed) return false;
    var iframe = document.createElement("iframe");
    iframe.src = embed; iframe.allowFullscreen = true;
    iframe.allow = "autoplay; fullscreen";
    container.appendChild(iframe);
  }
  return true;
}

function playHero() {
  var overlay = document.getElementById("hero-overlay");
  var player = document.getElementById("hero-player");
  if (overlay) overlay.style.display = "none";
  // replace thumb with actual player
  var url = window._heroVideoUrl;
  if (!url) return;
  var container = document.createElement("div");
  container.style.cssText = "position:absolute;inset:0;";
  if (url.match(/\.(webm|mp4)$/i)) {
    var v = document.createElement("video");
    v.src = url; v.controls = true; v.autoplay = true;
    v.style.cssText = "width:100%;height:100%;object-fit:cover;";
    container.appendChild(v);
  } else {
    var embed = getEmbedUrl(url, true);
    if (embed) {
      var iframe = document.createElement("iframe");
      iframe.src = embed; iframe.allowFullscreen = true;
      iframe.allow = "autoplay; fullscreen";
      iframe.style.cssText = "position:absolute;inset:0;width:100%;height:100%;border:none;";
      container.appendChild(iframe);
    }
  }
  player.appendChild(container);
}

function renderHero(projects) {
  var featured = projects.filter(function(p) { return (p.featured || "").toLowerCase() === "yes"; });
  if (!featured.length) return;
  var p = featured[0];
  var hero = document.getElementById("hero");
  document.getElementById("hero-title").textContent = p.title + (p.year ? "  ·  " + p.year : "");
  hero.style.display = "block";
  window._heroVideoUrl = p.video;
  // show thumbnail if available, overlay stays on top
  if (p.thumb) {
    var img = document.createElement("img");
    img.src = p.thumb;
    img.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;";
    document.getElementById("hero-player").prepend(img);
  }
}

function openModal(p) {
  var inner = document.querySelector(".modal-inner");
  document.getElementById("modal-title").textContent = p.title || "";
  if (p.page) {
    inner.classList.add("page-mode");
    var wrap = document.getElementById("modal-page-wrap");
    wrap.innerHTML = '<iframe src="' + p.page + '"></iframe>';
    document.getElementById("modal").classList.add("open");
    document.body.style.overflow = "hidden";
    return;
  }
  inner.classList.remove("page-mode");
  document.getElementById("modal-page-wrap").innerHTML = "";
  if (!p.video) return;
  buildPlayer(p.video, true, document.getElementById("modal-main-wrap"));
  var bdWrap = document.getElementById("modal-bd-wrap");
  var bdSection = document.getElementById("modal-breakdown-wrap");
  if (p.breakdown) { buildPlayer(p.breakdown, false, bdWrap); bdSection.classList.add("visible"); }
  else { bdWrap.innerHTML = ""; bdSection.classList.remove("visible"); }
  var infoEl = document.getElementById("modal-info");
  var metaEl = document.getElementById("modal-meta");
  var detailsEl = document.getElementById("modal-details");
  var hasInfo = p.details || p.studio || p.role || p.year;
  if (hasInfo) {
    metaEl.innerHTML = "";
    if (p.role) metaEl.innerHTML += '<div class="modal-meta-row"><span class="modal-meta-label">role</span><span class="modal-meta-value">' + p.role + '</span></div>';
    if (p.studio) metaEl.innerHTML += '<div class="modal-meta-row"><span class="modal-meta-label">studio</span><span class="modal-meta-value">' + p.studio + '</span></div>';
    if (p.year) metaEl.innerHTML += '<div class="modal-meta-row"><span class="modal-meta-label">year</span><span class="modal-meta-value">' + p.year + '</span></div>';
    detailsEl.textContent = p.details || "";
    infoEl.classList.remove("empty");
  } else { infoEl.classList.add("empty"); }
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  setTimeout(function() {
    document.getElementById("modal-main-wrap").innerHTML = "";
    document.getElementById("modal-bd-wrap").innerHTML = "";
    document.getElementById("modal-page-wrap").innerHTML = "";
    document.getElementById("modal-breakdown-wrap").classList.remove("visible");
    document.querySelector(".modal-inner").classList.remove("page-mode");
  }, 300);
  document.body.style.overflow = "";
}

function handleModalClick(e) { if (e.target === document.getElementById("modal")) closeModal(); }
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeModal(); });

function makeCard(p) {
  var card = document.createElement("div");
  card.className = "card" + (p.priority ? " card--featured" : "");
  var mediaHTML = "";
  if (p.thumb) mediaHTML += '<img src="' + p.thumb + '" alt="' + p.title + '" />';
  if (p.preview) mediaHTML += '<video src="' + p.preview + '" muted loop playsinline preload="auto"></video>';
  if (!p.thumb && !p.preview) mediaHTML = '<div class="card-fallback"><div class="fallback-play"></div></div>';
  card.innerHTML = mediaHTML + '<div class="card-overlay"></div>' + (p.role ? '<span class="role-tag">' + p.role + '</span>' : '') + '<div class="card-body"><div class="card-top"><span class="card-year">' + p.year + '</span></div><h2 class="card-title">' + p.title + '</h2><p class="card-desc">' + p.desc + '</p></div>' + (p.preview ? '<div class="scrub-bar"><div class="scrub-progress"></div></div>' : '');
  return card;
}

function renderGrid(projects) {
  var gridWrap = document.getElementById("grid").parentElement;
  var featured = projects.filter(function(p) { return p.priority; });
  var regular = projects.filter(function(p) { return !p.priority; });
  var allCards = [];

  function appendSection(container, list, offset) {
    list.forEach(function(p, i) {
      var card = makeCard(p);
      if (p.link) { card.addEventListener("click", function() { window.open(p.link,"_blank","noopener"); }); }
      else if (p.page || p.video) { (function(p){ card.addEventListener("click", function(){ openModal(p); }); })(p); }
      if (p.preview) attachScrub(card);
      container.appendChild(card);
      allCards.push({ card: card, delay: 30 + (offset + i) * 40 });
    });
  }

  var mainGrid = document.getElementById("grid");
  mainGrid.innerHTML = "";

  if (featured.length > 0) {
    var labelFeatured = document.createElement("div");
    labelFeatured.className = "grid-section-label";
    labelFeatured.textContent = "Selected Work";
    mainGrid.appendChild(labelFeatured);

    var featuredGrid = document.createElement("div");
    featuredGrid.className = "grid";
    mainGrid.appendChild(featuredGrid);
    appendSection(featuredGrid, featured, 0);

    if (regular.length > 0) {
      var divider = document.createElement("div");
      divider.className = "grid-divider";
      mainGrid.appendChild(divider);

      var labelAll = document.createElement("div");
      labelAll.className = "grid-section-label";
      labelAll.textContent = "All Work";
      mainGrid.appendChild(labelAll);

      var regularGrid = document.createElement("div");
      regularGrid.className = "grid";
      mainGrid.appendChild(regularGrid);
      appendSection(regularGrid, regular, featured.length);
    }
  } else {
    var onlyGrid = document.createElement("div");
    onlyGrid.className = "grid";
    mainGrid.appendChild(onlyGrid);
    appendSection(onlyGrid, projects, 0);
  }

  allCards.forEach(function(item) {
    setTimeout(function() { item.card.classList.add("visible"); }, item.delay);
  });
}

function attachScrub(c) {
  var v = c.querySelector("video");
  var bar = c.querySelector(".scrub-progress");
  var rafId = null;
  var pendingPct = null;
  var isTouch = false;
  function doSeek() {
    rafId = null;
    if (!v.duration || pendingPct === null) return;
    var t = pendingPct * v.duration;
    pendingPct = null;
    if (isTouch && v.fastSeek) v.fastSeek(t);
    else v.currentTime = t;
  }
  function scrubTo(clientX) {
    var rect = c.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    bar.style.width = (pct * 100) + "%";
    pendingPct = pct;
    if (!rafId) rafId = requestAnimationFrame(doSeek);
  }
  function scrubReset() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } pendingPct = null; v.pause(); v.currentTime = 0; bar.style.width = "0%"; }
  c.addEventListener("mouseenter", function() { isTouch = false; v.pause(); });
  c.addEventListener("mousemove", function(e) { scrubTo(e.clientX); });
  c.addEventListener("mouseleave", scrubReset);
  c.addEventListener("touchstart", function(e) { isTouch = true; v.pause(); c.classList.add("touch-active"); e.preventDefault(); }, { passive: false });
  c.addEventListener("touchmove", function(e) { scrubTo(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  c.addEventListener("touchend", function() { scrubReset(); c.classList.remove("touch-active"); });
}

function showEmail() {
  var email = window._contactEmail || "email";
  var el = document.getElementById("email-toggle");
  if (el.classList.contains("revealed")) {
    navigator.clipboard.writeText(email).catch(function(){});
    el.textContent = "copied!";
    setTimeout(function(){ el.textContent = email; }, 1500);
  } else { el.classList.add("revealed"); el.textContent = email; }
}

function toggleTheme() {
  var t = document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme", t === "dark" ? "light" : "dark");
}

function unlock() {
  if (window._stopNuke) window._stopNuke();
  document.getElementById("lock").classList.add("hidden");
  document.getElementById("site").classList.add("visible");
  fetch("projects.csv?nocache=" + Date.now())
    .then(function(r){ return r.text(); })
    .then(function(text){
      window._allProjects = sorted(parseCSV(text));
      applySettings(window._settings || {});
      renderHero(window._allProjects);
      renderGrid(window._allProjects);
      var roles = [];
      window._allProjects.forEach(function(p) {
        var r = (p.role || '').trim();
        if (r && roles.indexOf(r.toLowerCase()) === -1) roles.push(r.toLowerCase());
      });
      var roleBar = document.getElementById('role-filter-bar');
      if (roleBar && roles.length > 1) {
        var allBtn = document.createElement('button');
        allBtn.className = 'filter-btn active';
        allBtn.textContent = 'all roles';
        allBtn.onclick = function() { setRoleFilter('all', this); };
        roleBar.appendChild(allBtn);
        roles.forEach(function(role) {
          var btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.textContent = role;
          btn.onclick = function() { setRoleFilter(role, this); };
          roleBar.appendChild(btn);
        });
      }
    })
    .catch(function(){ renderGrid([]); });
}

if (!PASSWORD_ENABLED) { window.addEventListener("load", unlock); }

function check() {
  var val = document.getElementById("pwd").value;
  if (!PASSWORD_ENABLED || val === PASSWORD) { unlock(); }
  else {
    var input = document.getElementById("pwd"), err = document.getElementById("err");
    input.classList.add("error"); err.textContent = "wrong password";
    setTimeout(function(){ input.classList.remove("error"); err.textContent=""; input.value=""; input.focus(); }, 1500);
  }
}

document.getElementById("pwd").addEventListener("keydown", function(e){ if(e.key==="Enter") check(); });

// ── nuke nodes game ───────────────────────────
(function() {
  var canvas = document.getElementById("nuke-canvas");
  var ctx = canvas.getContext("2d");
  var nodes=[], particles=[], floaters=[];
  var score=0, shakeAmount=0;
  var mouseX=-999, mouseY=-999;
  var isMobile=('ontouchstart' in window);
  var raf;
  var NODE_NAMES=["Merge2","ColorCorrect","Grade","Blur","Transform","Roto","RotoPaint","Tracker","CameraTracker","Shuffle","Copy","Premult","Unpremult","ScanlineRender","DeepMerge","Keyer","IBKColour","ZDefocus","Glow","Flare","LensDistortion","STMap","VectorBlur","TimeBlur","MotionBlur","Dissolve","Switch","Dot","NoOp","Write"];
  var COLORS=["#4a90d9","#e8784a","#7db87a","#c97fd4","#d4b44a","#4abfd4","#8a9fd4"];
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  function spawnNode(){
    var name=NODE_NAMES[Math.floor(Math.random()*NODE_NAMES.length)];
    var color=COLORS[Math.floor(Math.random()*COLORS.length)];
    var sr=Math.random(), scale=sr<0.05?2.8:sr<0.20?1.8:sr<0.55?1.0:0.65;
    var baseW=Math.max(80,name.length*7+20), w=Math.round(baseW*scale), h=Math.round(22*scale);
    nodes.push({x:w/2+Math.random()*(canvas.width-w),y:-h,vy:(0.9+Math.random()*1.0)/scale,vx:(Math.random()-0.5)*0.4,name:name,color:color,w:w,h:h,scale:scale,caught:false,alpha:1});
  }
  function spawnParticles(x,y,color,count,speed){
    for(var i=0;i<count;i++){var a=Math.random()*Math.PI*2,s=speed*(0.6+Math.random()*0.8);particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color:color,alpha:1,r:2+Math.random()*speed*0.9,trail:speed>6});}
    if(speed>8) particles.push({x:x,y:y,ring:true,r:0,maxR:180,color:color,alpha:0.6,speed:speed});
    else if(speed>5) particles.push({x:x,y:y,ring:true,r:0,maxR:90,color:color,alpha:0.45,speed:speed});
  }
  function addFloater(x,y,text,color,size){floaters.push({x:x,y:y,text:text,color:color,alpha:1,size:size||12});}
  function catchNode(n){
    n.caught=true; score++;
    var pc,ps;
    if(n.scale>=2.8){pc=80;ps=12;shakeAmount=18;addFloater(n.x,n.y-40,"HUGE!",n.color,22);spawnParticles(n.x,n.y,"#ffffff",30,9);}
    else if(n.scale>=1.8){pc=40;ps=7;shakeAmount=Math.max(shakeAmount,6);addFloater(n.x,n.y-28,"BIG!",n.color,15);}
    else if(n.scale>=1.0){pc=18;ps=3.5;addFloater(n.x,n.y-20,"+1",n.color,11);}
    else{pc=8;ps=2;addFloater(n.x,n.y-16,"+1",n.color,10);}
    spawnParticles(n.x,n.y,n.color,pc,ps);
    document.getElementById("lock-score").textContent=score+(score===1?" node":" nodes");
  }
  function drawNode(n){
    ctx.save();ctx.globalAlpha=n.alpha;
    var x=n.x-n.w/2,y=n.y-n.h/2,fs=Math.round(10*Math.min(n.scale,1.4));
    if(n.scale>=2.8){ctx.shadowColor=n.color;ctx.shadowBlur=12;}
    ctx.beginPath();ctx.roundRect(x,y,n.w,n.h,4*Math.min(n.scale,1.5));
    ctx.fillStyle=n.color+"22";ctx.fill();ctx.strokeStyle=n.color;ctx.lineWidth=n.scale>=2.8?2:1;ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle=n.color;ctx.font=fs+"px Inter, monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(n.name,n.x,n.y);
    var dr=Math.max(2,3*Math.min(n.scale,1.4));
    ctx.beginPath();ctx.arc(n.x,y,dr,0,Math.PI*2);ctx.fillStyle=n.color;ctx.fill();
    ctx.beginPath();ctx.arc(n.x,y+n.h,dr,0,Math.PI*2);ctx.fillStyle=n.color;ctx.fill();
    ctx.restore();
  }
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(shakeAmount>0.3){var sx=(Math.random()-0.5)*shakeAmount,sy=(Math.random()-0.5)*shakeAmount;document.getElementById("lock").style.transform="translate("+sx+"px,"+sy+"px)";shakeAmount*=0.78;}
    else{document.getElementById("lock").style.transform="";shakeAmount=0;}
    if(Math.random()<0.022) spawnNode();
    var cr=isMobile?30:38,alive=[];
    for(var i=0;i<nodes.length;i++){
      var n=nodes[i];
      if(!n.caught){n.y+=n.vy;n.x+=n.vx;n.x=Math.max(n.w/2,Math.min(canvas.width-n.w/2,n.x));var r=cr+n.w*0.3,dx=mouseX-n.x,dy=mouseY-n.y;if(Math.sqrt(dx*dx+dy*dy)<r)catchNode(n);}
      else{n.alpha-=0.06;n.y-=2;}
      if(n.y<canvas.height+60&&n.alpha>0)alive.push(n);
      drawNode(n);
    }
    nodes=alive;
    var aliveP=[];
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      if(p.ring){p.r+=p.speed*1.4;p.alpha-=0.022;if(p.alpha>0&&p.r<p.maxR){ctx.save();ctx.globalAlpha=p.alpha;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.strokeStyle=p.color;ctx.lineWidth=2.5;ctx.stroke();ctx.restore();aliveP.push(p);}}
      else{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.alpha-=0.025;p.vx*=0.98;p.vy*=0.98;if(p.alpha>0){ctx.save();ctx.globalAlpha=p.alpha;if(p.trail){ctx.shadowColor=p.color;ctx.shadowBlur=6;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.shadowBlur=0;ctx.restore();aliveP.push(p);}}
    }
    particles=aliveP;
    var aliveF=[];
    for(var i=0;i<floaters.length;i++){var f=floaters[i];f.y-=1.2;f.alpha-=0.025;if(f.alpha>0){ctx.save();ctx.globalAlpha=f.alpha;ctx.font="bold "+f.size+"px Inter, sans-serif";ctx.fillStyle=f.color;ctx.textAlign="center";ctx.fillText(f.text,f.x,f.y);ctx.restore();aliveF.push(f);}}
    floaters=aliveF;
    raf=requestAnimationFrame(loop);
  }
  function tryTapCatch(cx,cy){var best=null,bestD=0;for(var i=0;i<nodes.length;i++){var n=nodes[i];if(n.caught)continue;var r=38+n.w*0.3,dx=cx-n.x,dy=cy-n.y,d=Math.sqrt(dx*dx+dy*dy);if(d<r&&(best===null||d<bestD)){bestD=d;best=n;}}if(best)catchNode(best);}
  function onMouseMove(e){mouseX=e.clientX;mouseY=e.clientY;}
  function onTouchStart(e){tryTapCatch(e.touches[0].clientX,e.touches[0].clientY);}
  resize();
  window.addEventListener("resize",resize);
  window.addEventListener("mousemove",onMouseMove);
  if(isMobile){canvas.style.pointerEvents="auto";canvas.addEventListener("touchstart",onTouchStart,{passive:true});}
  loop();
  window._stopNuke=function(){cancelAnimationFrame(raf);window.removeEventListener("mousemove",onMouseMove);canvas.removeEventListener("touchstart",onTouchStart);};
})();
</script>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>denny</title>
<link rel="icon" type="image/png" href="logo/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f2f0eb; --text: #1a1916; --text-muted: #8a8880; --accent: #c84b2f;
    --border: rgba(26,25,22,0.1); --card-hover: #e8e5df; --thumb: #d4d0c8;
    --input-border: rgba(26,25,22,0.2); --input-bg: #fff;
  }
  [data-theme="dark"] {
    --bg: #111110; --text: #eeebe4; --text-muted: #5a5854; --accent: #d95a38;
    --border: rgba(238,235,228,0.08); --card-hover: #1c1b18; --thumb: #252320;
    --input-border: rgba(238,235,228,0.15); --input-bg: #1a1917;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; overflow-x: hidden; width: 100%; }

  /* lock */
  #lock { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: background 0.3s; }
  #lock.hidden { display: none; }
  .lock-name { font-size: 13px; font-weight: 500; margin-bottom: 40px; }
  .lock-label { font-size: 11px; color: var(--text-muted); font-weight: 300; margin-bottom: 12px; letter-spacing: 0.05em; }
  .lock-form { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 210px; }
  .lock-input { width: 100%; padding: 10px 14px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; color: var(--text); background: var(--input-bg); border: 0.5px solid var(--input-border); border-radius: 4px; outline: none; text-align: center; letter-spacing: 0.2em; transition: border-color 0.2s, background 0.3s; }
  .lock-input:focus { border-color: var(--text-muted); }
  .lock-input.error { border-color: var(--accent); }
  .lock-btn { width: 100%; padding: 10px; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text); background: none; border: 0.5px solid var(--input-border); border-radius: 4px; cursor: pointer; transition: background 0.2s; letter-spacing: 0.05em; }
  .lock-btn:hover { background: var(--card-hover); border-color: var(--text-muted); }
  .lock-error { font-size: 11px; color: var(--accent); font-weight: 300; height: 14px; }

  /* site */
  #site { display: none; }
  #site.visible { display: block; }

  header { padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); min-width: 0; }
  .site-name { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }
  .site-brand { display: flex; align-items: center; gap: 8px; }
  .site-logo { width: 22px; height: 22px; object-fit: contain; }
  .header-right { display: flex; align-items: center; gap: 24px; }
  nav { display: flex; gap: 20px; }
  nav a { font-size: 12px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  nav a:hover, nav a.active { color: var(--text); }
  .theme-toggle { cursor: pointer; background: none; border: none; padding: 0; display: flex; align-items: center; }
  .toggle-track { width: 32px; height: 18px; background: var(--text-muted); border-radius: 9px; position: relative; transition: background 0.3s; }
  .toggle-knob { width: 12px; height: 12px; background: var(--bg); border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: transform 0.3s, background 0.3s; }
  [data-theme="dark"] .toggle-knob { transform: translateX(14px); }

  /* grid */
  .grid-wrap { padding: 24px 28px 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr)); gap: 12px; }

  /* card */
  .card { display: block; text-decoration: none; color: inherit; border-radius: 6px; overflow: hidden; position: relative; aspect-ratio: 16/9; background: var(--thumb); cursor: pointer; width: 100%; min-width: 0; }
  .card img, .card video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.45s ease; }
  .card video { opacity: 0; transition: opacity 0.4s ease, transform 0.45s ease; z-index: 1; }
  .card:hover img, .card:hover video { transform: scale(1.04); }
  .card:hover video { opacity: 1; }
  .card-overlay { position: absolute; inset: 0; z-index: 2; background: linear-gradient(to bottom, transparent 30%, rgba(10,9,8,0.55) 65%, rgba(10,9,8,0.82) 100%); }
  .card-body { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; padding: 18px 20px; display: flex; flex-direction: column; gap: 5px; }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .card-year { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 300; }
  .role-tag { font-size: 9px; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(255,255,255,0.9); background: rgba(200,75,47,0.75); padding: 3px 8px; border-radius: 2px; white-space: nowrap; }
  .card-title { font-size: 16px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.2; color: #fff; }
  .card-desc { font-size: 11px; line-height: 1.6; color: rgba(255,255,255,0.6); font-weight: 300; max-height: 0; overflow: hidden; transition: max-height 0.35s ease, opacity 0.3s; opacity: 0; }
  .card:hover .card-desc { max-height: 60px; opacity: 1; }
  .card-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .fallback-play { width: 34px; height: 34px; border: 1.5px solid rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .fallback-play::after { content: ''; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid rgba(255,255,255,0.4); margin-left: 3px; }

  /* modal */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.88);
    align-items: flex-start;
    justify-content: center;
    padding: 40px 24px 40px;
    overflow-y: auto;
    cursor: pointer;
  }
  #modal.open { display: flex; }

  .modal-inner {
    position: relative;
    width: 100%;
    max-width: 900px;
    cursor: default;
    display: flex;
    flex-direction: column;
    gap: 0;
    margin: auto;
  }

  .modal-close {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 14px;
  }

  .modal-close button {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    padding: 4px 0;
  }

  .modal-close button:hover { color: #fff; }

  .modal-video {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .modal-video iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .modal-breakdown {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .modal-breakdown-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    font-family: 'Inter', sans-serif;
  }

  .modal-breakdown-video {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .modal-breakdown-video iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* mobile */
  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .site-name { font-size: 13px; }
    nav { gap: 12px; }
    nav a { font-size: 11px; }
    .header-right { gap: 16px; }
    .grid-wrap { padding: 12px 12px 32px; }
    .grid { grid-template-columns: 1fr; gap: 10px; }
    .card-title { font-size: 15px; }
    .card-body { padding: 14px 16px; }
    footer { padding: 18px 16px; flex-direction: column; align-items: flex-start; gap: 12px; }
    #modal { padding: 20px 12px; }
  }

  /* footer */
  footer { padding: 22px 32px; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .footer-copy { font-size: 11px; color: var(--text-muted); font-weight: 300; }
  .footer-links { display: flex; gap: 20px; }
  .footer-links a { font-size: 11px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--text); }
</style>
</head>
<body>

<div id="lock">
  <p class="lock-name">denny</p>
  <p class="lock-label">enter password to view</p>
  <div class="lock-form">
    <input class="lock-input" type="password" id="pwd" placeholder="· · · ·" maxlength="32" />
    <div class="lock-error" id="err"></div>
    <button class="lock-btn" onclick="check()">enter</button>
  </div>
</div>

<div id="site">
  <header>
    <div class="site-brand"><span class="site-name">denny</span><img class="site-logo" src="logo/logo.png" alt="logo" /></div>
    <div class="header-right">
      <nav>
        <a href="#" class="active">work</a>
        <a href="#">about</a>
        <a href="#">contact</a>
      </nav>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="toggle theme">
        <div class="toggle-track"><div class="toggle-knob"></div></div>
      </button>
    </div>
  </header>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <footer>
    <span class="footer-copy">© 2024 denny</span>
    <div class="footer-links">
      <a href="#">vimeo</a>
      <a href="#">linkedin</a>
      <a href="#">email</a>
    </div>
  </footer>
</div>

<!-- modal -->
<div id="modal" onclick="handleModalClick(event)">
  <div class="modal-inner">
    <div class="modal-close"><button onclick="closeModal()">close ✕</button></div>
    <div class="modal-video" id="modal-main-wrap"></div>
    <div class="modal-breakdown" id="modal-breakdown" style="display:none">
      <span class="modal-breakdown-label">breakdown</span>
      <div class="modal-breakdown-video" id="modal-bd-wrap"></div>
    </div>
  </div>
</div>

<script src="projects.js"></script>
<script>
const PASSWORD = "1234";

function getEmbedUrl(url, autoplay) {
  if (!url) return null;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}${autoplay ? '?autoplay=1&rel=0' : '?rel=0'}`;
  const vm = url.match(/vimeo\.com\/(\d+)/);
  if (vm) return `https://player.vimeo.com/video/${vm[1]}${autoplay ? '?autoplay=1' : ''}`;
  return null;
}

function buildPlayer(url, autoplay, container) {
  container.innerHTML = "";
  if (url.match(/\.webm$/i) || url.match(/\.mp4$/i)) {
    const video = document.createElement("video");
    video.src = url;
    video.controls = true;
    if (autoplay) video.autoplay = true;
    video.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;";
    container.appendChild(video);
  } else {
    const embed = getEmbedUrl(url, autoplay);
    if (!embed) return false;
    const iframe = document.createElement("iframe");
    iframe.src = embed;
    iframe.allowFullscreen = true;
    iframe.allow = "autoplay; fullscreen";
    iframe.style.cssText = "position:absolute;inset:0;width:100%;height:100%;border:none;";
    container.appendChild(iframe);
  }
  return true;
}

function openModal(videoUrl, breakdownUrl) {
  if (!videoUrl) return;

  const mainWrap = document.getElementById("modal-main-wrap");
  const ok = buildPlayer(videoUrl, true, mainWrap);
  if (!ok) return;

  const bd = document.getElementById("modal-breakdown");
  const bdWrap = document.getElementById("modal-bd-wrap");

  if (breakdownUrl) {
    buildPlayer(breakdownUrl, false, bdWrap);
    bd.style.display = "flex";
  } else {
    bd.style.display = "none";
    bdWrap.innerHTML = "";
  }

  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.getElementById("modal-main-wrap").innerHTML = "";
  document.getElementById("modal-bd-wrap").innerHTML = "";
  document.getElementById("modal-breakdown").style.display = "none";
  document.body.style.overflow = "";
}

function handleModalClick(e) {
  if (e.target === document.getElementById("modal")) closeModal();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function sorted(list) {
  const p = list.filter(x => x.priority != null).sort((a,b) => a.priority - b.priority);
  const np = list.filter(x => x.priority == null).sort((a,b) => Number(b.year) - Number(a.year));
  return [...p, ...np];
}

function renderGrid() {
  const grid = document.getElementById("grid");
  sorted(projects).forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    let mediaHTML = "";
    if (p.thumb) mediaHTML += `<img src="${p.thumb}" alt="${p.title}" />`;
    if (p.preview) mediaHTML += `<video src="${p.preview}" muted loop playsinline preload="auto"></video>`;
    if (!p.thumb && !p.preview) mediaHTML = `<div class="card-fallback"><div class="fallback-play"></div></div>`;

    card.innerHTML = `
      ${mediaHTML}
      <div class="card-overlay"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-year">${p.year}</span>
          <span class="role-tag">${p.role}</span>
        </div>
        <h2 class="card-title">${p.title}</h2>
        <p class="card-desc">${p.desc}</p>
      </div>`;

    if (p.preview) {
      const video = card.querySelector("video");
      card.addEventListener("mouseenter", () => {
        video.currentTime = 0;
        const play = video.play();
        if (play !== undefined) play.catch(() => {});
      });
      card.addEventListener("mouseleave", () => { video.pause(); video.currentTime = 0; });
    }

    if (p.video) {
      card.addEventListener("click", () => openModal(p.video, p.breakdown));
    }

    grid.appendChild(card);
  });
}

function unlock() {
  document.getElementById("lock").classList.add("hidden");
  document.getElementById("site").classList.add("visible");
  renderGrid();
}

function check() {
  const val = document.getElementById("pwd").value;
  if (val === PASSWORD) {
    unlock();
  } else {
    const input = document.getElementById("pwd");
    const err = document.getElementById("err");
    input.classList.add("error");
    err.textContent = "wrong password";
    setTimeout(() => { input.classList.remove("error"); err.textContent = ""; input.value = ""; input.focus(); }, 1500);
  }
}

document.getElementById("pwd").addEventListener("keydown", e => { if (e.key === "Enter") check(); });

function toggleTheme() {
  const t = document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme", t === "dark" ? "light" : "dark");
}
</script>
</body>
</html>

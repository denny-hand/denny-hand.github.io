<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>newline converter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #eee; padding: 32px; min-height: 100vh; }
  h1 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: #aaa; letter-spacing: 0.05em; text-transform: uppercase; }
  p { font-size: 12px; color: #666; margin-bottom: 20px; }
  .row { display: flex; gap: 16px; height: 300px; }
  textarea {
    flex: 1; background: #111; border: 1px solid #333; color: #eee;
    font-size: 13px; line-height: 1.6; padding: 14px; resize: none;
    border-radius: 6px; font-family: inherit; outline: none;
  }
  textarea:focus { border-color: #555; }
  .arrow {
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #444; flex-shrink: 0; user-select: none;
  }
  .btn {
    margin-top: 12px; padding: 10px 22px; background: #2a2a2a;
    border: 1px solid #444; color: #ccc; border-radius: 6px;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .btn:hover { background: #333; border-color: #666; color: #fff; }
  .btn.copied { background: #1a3a1a; border-color: #3a7a3a; color: #7dca7d; }
  .note { font-size: 11px; color: #555; margin-top: 10px; }
</style>
</head>
<body>

<h1>Newline Converter</h1>
<p>Paste Instagram text on the left → copy result on the right → paste into LibreOffice Calc</p>

<div class="row">
  <textarea id="input" placeholder="Paste text here...&#10;&#10;Line breaks are fine here"></textarea>
  <div class="arrow">→</div>
  <textarea id="output" placeholder="Result will appear here..." readonly></textarea>
</div>

<button class="btn" id="copy-btn" onclick="copyResult()">Copy result</button>
<p class="note">Newlines are replaced with \n — the site converts them back automatically</p>

<script>
  document.getElementById('input').addEventListener('input', convert);

  function convert() {
    var raw = document.getElementById('input').value;
    // replace real newlines with literal \n, trim trailing whitespace per line
    var result = raw
      .replace(/\r\n/g, '\n')
      .replace(/\r/g, '\n')
      .replace(/\u2028/g, '\n')
      .replace(/\u2029/g, '\n\n')
      .split('\n')
      .map(function(l) { return l.trimEnd(); })
      .join('\\n');
    document.getElementById('output').value = result;
  }

  function copyResult() {
    var out = document.getElementById('output');
    if (!out.value) return;
    navigator.clipboard.writeText(out.value).then(function() {
      var btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = 'Copy result';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') copyResult();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSV Lint</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #eee; padding: 32px; min-height: 100vh; }

  h1 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: #aaa; letter-spacing: 0.05em; text-transform: uppercase; }
  .subtitle { font-size: 12px; color: #555; margin-bottom: 20px; }

  textarea {
    width: 100%; height: 180px; background: #111; border: 1px solid #333; color: #eee;
    font-size: 12px; line-height: 1.5; padding: 14px; resize: vertical;
    border-radius: 6px; font-family: 'Courier New', monospace; outline: none;
  }
  textarea:focus { border-color: #555; }
  textarea::placeholder { color: #444; }

  .btn {
    margin-top: 12px; padding: 10px 22px; background: #2a2a2a;
    border: 1px solid #444; color: #ccc; border-radius: 6px;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .btn:hover { background: #333; border-color: #666; color: #fff; }

  /* ── summary bar ── */
  .summary {
    display: flex; gap: 10px; margin-top: 28px; margin-bottom: 20px;
    align-items: center; flex-wrap: wrap;
  }
  .badge {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    letter-spacing: 0.03em;
  }
  .badge-ok    { background: #1a3a1a; border: 1px solid #3a7a3a; color: #7dca7d; }
  .badge-warn  { background: #3a2e00; border: 1px solid #7a6000; color: #e0b840; }
  .badge-error { background: #3a1a1a; border: 1px solid #7a3a3a; color: #e07070; }
  .badge-info  { background: #1a2a3a; border: 1px solid #3a5a7a; color: #70aadd; }

  /* ── sections ── */
  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: #555; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #222;
  }

  /* ── issue items ── */
  .issue {
    display: flex; gap: 10px; align-items: baseline;
    padding: 7px 0; border-bottom: 1px solid #1e1e1e; font-size: 12px; line-height: 1.5;
  }
  .issue:last-child { border-bottom: none; }
  .issue-tag {
    flex-shrink: 0; font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 3px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .tag-error { background: #3a1a1a; color: #e07070; }
  .tag-warn  { background: #3a2e00; color: #e0b840; }
  .issue-row { color: #555; flex-shrink: 0; min-width: 50px; }
  .issue-title { color: #888; margin-right: 4px; }
  .issue-msg { color: #ccc; }

  /* ── file manifest ── */
  .folder-block { margin-bottom: 16px; }
  .folder-name {
    font-size: 11px; font-weight: 600; color: #666; letter-spacing: 0.05em;
    margin-bottom: 6px; font-family: 'Courier New', monospace;
  }
  .file-list { display: flex; flex-direction: column; gap: 3px; }
  .file-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; font-family: 'Courier New', monospace;
    padding: 4px 8px; background: #111; border-radius: 4px; color: #aaa;
  }
  .file-item .file-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .dot-thumb   { background: #5a8a5a; }
  .dot-preview { background: #5a7aaa; }
  .dot-video   { background: #aa7a5a; }
  .dot-logo    { background: #7a5aaa; }
  .dot-other   { background: #666; }
  .file-rows { margin-left: auto; color: #444; font-size: 10px; font-family: inherit; }

  /* ── empty state ── */
  #results { display: none; }
  .empty-state { color: #444; font-size: 13px; margin-top: 32px; text-align: center; padding: 40px 0; }
</style>
</head>
<body>

<h1>CSV Lint</h1>
<p class="subtitle">Вставь содержимое projects.csv — проверит ошибки и покажет список файлов для загрузки</p>

<textarea id="csv-input" placeholder="Вставь сюда содержимое projects.csv..."></textarea>
<button class="btn" onclick="analyze()">Проверить</button>

<div id="results">
  <div class="summary" id="summary"></div>

  <div class="section" id="issues-section">
    <div class="section-title">Ошибки и предупреждения</div>
    <div id="issues-list"></div>
  </div>

  <div class="section" id="files-section">
    <div class="section-title">Файлы для загрузки на GitHub</div>
    <div id="files-list"></div>
  </div>
</div>

<script>
/* ── CSV parser (RFC 4180, same as main site) ── */
function csvRows(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n')
             .replace(/ /g, '\n').replace(/ /g, '\n\n');
  var rows = [], fields = [], cur = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cur += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { fields.push(cur); cur = ''; }
      else if (c === '\n') { fields.push(cur); rows.push(fields); fields = []; cur = ''; }
      else { cur += c; }
    }
  }
  if (cur || fields.length) { fields.push(cur); rows.push(fields); }
  return rows;
}

function folderOf(path) {
  if (!path) return null;
  var slash = path.lastIndexOf('/');
  return slash >= 0 ? path.slice(0, slash + 1) : '';
}

function dotClass(folder) {
  if (!folder) return 'dot-other';
  if (folder.startsWith('thumbs'))   return 'dot-thumb';
  if (folder.startsWith('preview'))  return 'dot-preview';
  if (folder.startsWith('video') || folder.startsWith('breakdown')) return 'dot-video';
  if (folder.startsWith('logo') || folder.startsWith('award'))      return 'dot-logo';
  return 'dot-other';
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function analyze() {
  var raw = document.getElementById('csv-input').value.trim();
  if (!raw) return;

  var allRows = csvRows(raw);

  /* skip comment rows, find header */
  var headerIdx = -1;
  for (var i = 0; i < allRows.length; i++) {
    if (allRows[i][0] && !allRows[i][0].startsWith('#')) { headerIdx = i; break; }
  }

  if (headerIdx < 0) {
    showError('Не найдена строка заголовков (первая строка без #)');
    return;
  }

  var header = allRows[headerIdx].map(function(h) { return h.trim().toLowerCase(); });
  var expectedCols = header.length;

  function col(fields, name) {
    var idx = header.indexOf(name);
    return idx >= 0 ? (fields[idx] || '').trim() : '';
  }

  var dataRows = allRows.slice(headerIdx + 1).filter(function(r) {
    /* skip fully empty rows and comment rows */
    if (!r || r.length === 0) return false;
    var first = (r[0] || '').trim();
    return first !== '' && !first.startsWith('#');
  });

  var issues = [];
  var filemap = {}; /* path → [row numbers] */
  var seenTitles = {};
  var okCount = 0;

  var FILE_COLS = ['thumb','preview','video','breakdown','logo','award','page'];

  dataRows.forEach(function(fields, idx) {
    var rowNum = idx + 1;
    var titleVal = col(fields, 'title') || ('строка ' + rowNum);
    var hasIssue = false;

    function err(msg) {
      issues.push({ type: 'error', row: rowNum, title: titleVal, msg: msg });
      hasIssue = true;
    }
    function warn(msg) {
      issues.push({ type: 'warn', row: rowNum, title: titleVal, msg: msg });
      hasIssue = true;
    }

    /* column count */
    if (fields.length !== expectedCols) {
      err('Колонок ' + fields.length + ', ожидается ' + expectedCols);
    }

    /* required fields */
    if (!col(fields, 'title')) err('Пустой title');
    if (!col(fields, 'thumb')) warn('Нет thumb — карточка будет без картинки');

    /* date format */
    var dateVal = col(fields, 'date');
    if (dateVal && !/^\d{4}-\d{2}$/.test(dateVal)) {
      warn('date "' + dateVal + '" не в формате YYYY-MM');
    }

    /* selected */
    var selVal = col(fields, 'selected');
    if (selVal && selVal.toLowerCase() !== 'true') {
      warn('selected "' + selVal + '" — допустимо только true или пусто');
    }

    /* featured */
    var featVal = col(fields, 'featured');
    if (featVal && featVal.toLowerCase() !== 'yes') {
      warn('featured "' + featVal + '" — допустимо только yes или пусто');
    }

    /* priority */
    var priVal = col(fields, 'priority');
    if (priVal && isNaN(Number(priVal))) {
      warn('priority "' + priVal + '" не является числом');
    }

    /* duplicate title */
    var titleKey = (col(fields, 'title') || '').toLowerCase().trim();
    if (titleKey) {
      if (seenTitles[titleKey]) {
        warn('Дублирующийся title (уже встречался в строке ' + seenTitles[titleKey] + ')');
      } else {
        seenTitles[titleKey] = rowNum;
      }
    }

    /* collect files */
    FILE_COLS.forEach(function(c) {
      var val = col(fields, c);
      if (!val) return;
      /* skip external URLs */
      if (/^https?:\/\//.test(val)) return;
      var path = val.trim();
      if (!filemap[path]) filemap[path] = [];
      filemap[path].push(rowNum);
    });

    if (!hasIssue) okCount++;
  });

  /* ── render ── */
  var errCount  = issues.filter(function(i) { return i.type === 'error'; }).length;
  var warnCount = issues.filter(function(i) { return i.type === 'warn';  }).length;
  var fileCount = Object.keys(filemap).length;

  /* summary */
  var sumHTML = '';
  sumHTML += '<span class="badge badge-ok">✓ ' + okCount + ' строк без замечаний</span>';
  if (errCount)  sumHTML += '<span class="badge badge-error">✗ ' + errCount  + ' ' + plural(errCount,  'ошибка','ошибки','ошибок') + '</span>';
  if (warnCount) sumHTML += '<span class="badge badge-warn">⚠ ' + warnCount + ' ' + plural(warnCount, 'предупреждение','предупреждения','предупреждений') + '</span>';
  sumHTML += '<span class="badge badge-info">📁 ' + fileCount + ' файлов</span>';
  document.getElementById('summary').innerHTML = sumHTML;

  /* issues */
  var issuesSection = document.getElementById('issues-section');
  var issuesList = document.getElementById('issues-list');
  if (issues.length === 0) {
    issuesSection.style.display = 'none';
  } else {
    issuesSection.style.display = '';
    var html = '';
    issues.forEach(function(issue) {
      html += '<div class="issue">'
        + '<span class="issue-tag ' + (issue.type === 'error' ? 'tag-error' : 'tag-warn') + '">'
        + (issue.type === 'error' ? 'ошибка' : 'warning') + '</span>'
        + '<span class="issue-row">стр. ' + issue.row + '</span>'
        + '<span><span class="issue-title">' + esc(issue.title) + ':</span>'
        + '<span class="issue-msg">' + esc(issue.msg) + '</span></span>'
        + '</div>';
    });
    issuesList.innerHTML = html;
  }

  /* files */
  var filesSection = document.getElementById('files-section');
  var filesList = document.getElementById('files-list');
  if (fileCount === 0) {
    filesSection.style.display = 'none';
  } else {
    filesSection.style.display = '';

    /* group by folder */
    var folders = {};
    Object.keys(filemap).forEach(function(path) {
      var f = folderOf(path) || '(root)';
      if (!folders[f]) folders[f] = [];
      folders[f].push({ path: path, rows: filemap[path] });
    });

    /* sort folders alphabetically */
    var folderKeys = Object.keys(folders).sort();
    var html = '';
    folderKeys.forEach(function(folder) {
      var files = folders[folder].sort(function(a,b) { return a.path.localeCompare(b.path); });
      html += '<div class="folder-block">';
      html += '<div class="folder-name">' + esc(folder) + ' <span style="color:#444;font-weight:400">(' + files.length + ')</span></div>';
      html += '<div class="file-list">';
      files.forEach(function(f) {
        html += '<div class="file-item">'
          + '<span class="file-dot ' + dotClass(folder) + '"></span>'
          + '<span>' + esc(f.path) + '</span>'
          + '<span class="file-rows">строки: ' + f.rows.join(', ') + '</span>'
          + '</div>';
      });
      html += '</div></div>';
    });
    filesList.innerHTML = html;
  }

  document.getElementById('results').style.display = '';
}

function showError(msg) {
  document.getElementById('summary').innerHTML =
    '<span class="badge badge-error">✗ ' + esc(msg) + '</span>';
  document.getElementById('issues-section').style.display = 'none';
  document.getElementById('files-section').style.display = 'none';
  document.getElementById('results').style.display = '';
}

function plural(n, one, few, many) {
  var mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return n + ' ' + one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return n + ' ' + few;
  return n + ' ' + many;
}

/* auto-analyze on paste */
document.getElementById('csv-input').addEventListener('paste', function() {
  setTimeout(analyze, 50);
});
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});
</script>
</body>
</html>
